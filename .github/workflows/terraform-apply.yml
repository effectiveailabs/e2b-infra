name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'iac/provider-gcp/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Terraform environment to plan/apply'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
      phase:
        description: 'Which phase to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - infra-only
          - nomad-only

# ──────────────────────────────────────────────────────────────
# Job graph:
#
#   plan-infra ──▶ apply-infra ──▶ build-images ──▶ plan-nomad ──▶ apply-nomad
#
# Infra phase: GCP resources (VMs, buckets, firewall, IAM, etc.)
#   - Runs from public GH runner via GCP APIs
#
# Build images: Ensures required Docker images exist in AR
#   - Uses Cloud Build via GCP APIs
#
# Nomad phase: Nomad jobs, variables, services
#   - Requires IAP tunnel to reach Nomad server in the VPC
# ──────────────────────────────────────────────────────────────

jobs:
  # ════════════════════════════════════════════════
  #  PHASE 1: Infrastructure (public GCP APIs)
  # ════════════════════════════════════════════════

  plan-infra:
    name: Plan infra
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.phase == 'all' ||
      github.event.inputs.phase == 'infra-only'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    outputs:
      has_changes: ${{ steps.plan_output.outputs.has_changes }}
      plan_summary: ${{ steps.plan_output.outputs.plan_summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/deploy-setup
        with:
          environment: staging
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          gcp_region: ${{ vars.GCP_REGION }}
          terraform_state_bucket: ${{ vars.TERRAFORM_STATE_BUCKET }}
          workload_identity_provider: ${{ secrets.GH_WORKLOAD_IDENTITY_PROVIDER }}
          install_gcloud: 'true'

      - name: Terraform plan (infra)
        id: tf_plan
        working-directory: iac/provider-gcp
        env:
          TF_IN_AUTOMATION: 'true'
        run: |
          TARGETS=$(grep '^module' main.tf | awk '{print $2}' | tr -d '"' | grep -v nomad | awk '{print "-target=module." $0}' | xargs)

          terraform plan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -compact-warnings \
            -parallelism=20 \
            -var-file=environments/staging.tfvars \
            $TARGETS \
            -out=tfplan 2>&1 | tee plan.out
          plan_exit=${PIPESTATUS[0]}

          if [ $plan_exit -eq 0 ] || [ $plan_exit -eq 2 ]; then
            terraform show -no-color tfplan > plan.show
          fi
          echo "exit_code=$plan_exit" >> $GITHUB_OUTPUT
          if [ $plan_exit -ne 0 ] && [ $plan_exit -ne 2 ]; then
            echo "::error::Terraform plan exited with unexpected code $plan_exit"
            exit 1
          fi

      - name: Extract plan summary
        id: plan_output
        working-directory: iac/provider-gcp
        run: |
          # Detect changes from plan output (more reliable than exit codes
          # which can be lost through pipes).
          if [ -f plan.show ] && grep -qE '^Plan:' plan.show; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            summary=$(grep -E '^Plan:' plan.show | tail -1)
            echo "plan_summary=$summary" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload plan artifact
        if: steps.plan_output.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-infra
          path: |
            iac/provider-gcp/tfplan
            iac/provider-gcp/plan.out
            iac/provider-gcp/plan.show

  apply-infra:
    name: Apply infra
    needs: plan-infra
    if: needs.plan-infra.outputs.has_changes == 'true'
    runs-on: ubuntu-22.04
    concurrency:
      group: terraform-apply-e2b-infra
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/deploy-setup
        with:
          environment: staging
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          gcp_region: ${{ vars.GCP_REGION }}
          terraform_state_bucket: ${{ vars.TERRAFORM_STATE_BUCKET }}
          workload_identity_provider: ${{ secrets.GH_WORKLOAD_IDENTITY_PROVIDER }}
          install_gcloud: 'true'

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-infra
          path: iac/provider-gcp

      - name: Terraform apply (infra)
        working-directory: iac/provider-gcp
        env:
          TF_IN_AUTOMATION: 'true'
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            -compact-warnings \
            -parallelism=20 \
            tfplan

  # ════════════════════════════════════════════════
  #  BUILD: Ensure required Docker images exist
  # ════════════════════════════════════════════════

  build-images:
    name: Build missing images
    needs: apply-infra
    if: >-
      always() &&
      (needs.apply-infra.result == 'success' || needs.apply-infra.result == 'skipped') &&
      (
        github.event_name == 'push' ||
        github.event.inputs.phase == 'all' ||
        github.event.inputs.phase == 'nomad-only'
      )
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GH_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: 'github-actions-deployer@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build missing images
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
        run: |
          AR_REPO="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/e2b-core"

          # Images required by the Nomad TF module (see nomad/images.tf)
          REQUIRED_IMAGES="api db-migrator docker-reverse-proxy client-proxy"

          for img in $REQUIRED_IMAGES; do
            # Check if image:latest already exists in AR
            if gcloud artifacts docker images describe "${AR_REPO}/${img}:latest" >/dev/null 2>&1; then
              echo "✅ ${img}:latest exists"
              continue
            fi

            echo "🔨 Building ${img}..."
            case "$img" in
              db-migrator)
                # db-migrator needs packages/shared + packages/db as build context
                # The Dockerfile expects ./shared and ./db at context root
                cat > /tmp/cloudbuild-db-migrator.yaml << 'CBEOF'
          steps:
            - name: 'gcr.io/cloud-builders/docker'
              args: ['build', '-t', '$_AR_REPO/db-migrator:latest', '-f', 'db/Dockerfile', '.']
          images: ['$_AR_REPO/db-migrator:latest']
          timeout: 600s
          CBEOF
                gcloud builds submit \
                  --config=/tmp/cloudbuild-db-migrator.yaml \
                  --substitutions="_AR_REPO=${AR_REPO}" \
                  packages/
                ;;
              *)
                echo "⚠️  No build rule for ${img} — skipping (must be pre-built)"
                ;;
            esac
          done

  # ════════════════════════════════════════════════
  #  PHASE 2: Nomad jobs (requires IAP tunnel)
  # ════════════════════════════════════════════════

  plan-nomad:
    name: Plan nomad
    needs: build-images
    if: >-
      always() &&
      (needs.build-images.result == 'success' || needs.build-images.result == 'skipped') &&
      (
        github.event_name == 'push' ||
        github.event.inputs.phase == 'all' ||
        github.event.inputs.phase == 'nomad-only'
      )
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    outputs:
      has_changes: ${{ steps.plan_output.outputs.has_changes }}
      plan_summary: ${{ steps.plan_output.outputs.plan_summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/deploy-setup
        with:
          environment: staging
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          gcp_region: ${{ vars.GCP_REGION }}
          terraform_state_bucket: ${{ vars.TERRAFORM_STATE_BUCKET }}
          workload_identity_provider: ${{ secrets.GH_WORKLOAD_IDENTITY_PROVIDER }}
          install_gcloud: 'true'

      - name: Install dependencies
        run: |
          # xxd is needed by checksum.sh
          sudo apt-get update -qq && sudo apt-get install -y -qq xxd

          # Install nomad CLI (needed by get-nomad-job-count.sh)
          curl -sL https://releases.hashicorp.com/nomad/1.7.7/nomad_1.7.7_linux_amd64.zip -o /tmp/nomad.zip
          sudo unzip -oq /tmp/nomad.zip -d /usr/local/bin/

      - name: Discover Nomad server
        id: discover
        run: |
          # Find the Nomad server VM. The MIG may have multiple instances
          # during rolling updates; pick the one NOT being deleted.
          CANDIDATES=$(gcloud compute instances list \
            --filter="name~e2b-staging-orch-server AND status=RUNNING" \
            --format="value(name,zone)" \
            --sort-by="~creationTimestamp")

          # Try each candidate until we find one with a reachable Nomad port
          while IFS=$'\t' read -r VM ZONE; do
            echo "Trying $VM in $ZONE..."
            echo "server_vm=$VM" >> $GITHUB_OUTPUT
            echo "server_zone=$ZONE" >> $GITHUB_OUTPUT
            break  # take the newest
          done <<< "$CANDIDATES"
          echo "Selected Nomad server: $(cat $GITHUB_OUTPUT | grep server_vm)"

      - name: Open IAP tunnel to Nomad
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          # Map the internal Nomad DNS to localhost so both the Nomad TF
          # provider and external data source scripts resolve correctly
          echo "127.0.0.1 nomad.sandbox.e2b.staging.internal" | sudo tee -a /etc/hosts

          # Tunnel to port 80 to match the internal LB's forwarding rule.
          # Inside the VPC, the wildcard DNS resolves to the internal LB on
          # port 80, which routes to the Nomad backend on port 4646.
          # We tunnel directly to the Nomad server's port 4646 but expose
          # it locally on port 80 so TF code using the domain name (no port)
          # connects correctly.
          # sudo is needed for binding to port 80; --project is required
          # because sudo strips environment variables.
          sudo -E gcloud compute start-iap-tunnel \
            ${{ steps.discover.outputs.server_vm }} 4646 \
            --local-host-port=localhost:80 \
            --zone=${{ steps.discover.outputs.server_zone }} \
            --project="${GCP_PROJECT_ID}" &
          TUNNEL_PID=$!
          echo "TUNNEL_PID=$TUNNEL_PID" >> $GITHUB_ENV

          # Wait for tunnel to establish
          for i in $(seq 1 30); do
            if curl -s --connect-timeout 2 http://nomad.sandbox.e2b.staging.internal/v1/status/leader > /dev/null 2>&1; then
              echo "IAP tunnel established"
              break
            fi
            sleep 2
          done

      - name: Terraform plan (nomad)
        id: tf_plan
        working-directory: iac/provider-gcp
        env:
          TF_IN_AUTOMATION: 'true'
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -compact-warnings \
            -parallelism=10 \
            -var-file=environments/staging.tfvars \
            -target=module.nomad \
            -out=tfplan-nomad 2>&1 | tee plan.out
          plan_exit=${PIPESTATUS[0]}

          if [ $plan_exit -eq 0 ] || [ $plan_exit -eq 2 ]; then
            terraform show -no-color tfplan-nomad > plan.show
          fi
          echo "exit_code=$plan_exit" >> $GITHUB_OUTPUT
          if [ $plan_exit -ne 0 ] && [ $plan_exit -ne 2 ]; then
            echo "::error::Terraform plan exited with unexpected code $plan_exit"
            exit 1
          fi

      - name: Extract plan summary
        id: plan_output
        working-directory: iac/provider-gcp
        run: |
          # Detect changes from plan output (more reliable than exit codes
          # which can be lost through pipes).
          if [ -f plan.show ] && grep -qE '^Plan:' plan.show; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            summary=$(grep -E '^Plan:' plan.show | tail -1)
            echo "plan_summary=$summary" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload plan artifact
        if: steps.plan_output.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-nomad
          path: |
            iac/provider-gcp/tfplan-nomad
            iac/provider-gcp/plan.out
            iac/provider-gcp/plan.show

      - name: Close IAP tunnel
        if: always()
        run: kill $TUNNEL_PID 2>/dev/null || true

  apply-nomad:
    name: Apply nomad
    needs: plan-nomad
    if: needs.plan-nomad.outputs.has_changes == 'true'
    runs-on: ubuntu-22.04
    concurrency:
      group: terraform-apply-e2b-nomad
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/deploy-setup
        with:
          environment: staging
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          gcp_region: ${{ vars.GCP_REGION }}
          terraform_state_bucket: ${{ vars.TERRAFORM_STATE_BUCKET }}
          workload_identity_provider: ${{ secrets.GH_WORKLOAD_IDENTITY_PROVIDER }}
          install_gcloud: 'true'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq xxd
          curl -sL https://releases.hashicorp.com/nomad/1.7.7/nomad_1.7.7_linux_amd64.zip -o /tmp/nomad.zip
          sudo unzip -oq /tmp/nomad.zip -d /usr/local/bin/

      - name: Discover Nomad server
        id: discover
        run: |
          CANDIDATES=$(gcloud compute instances list \
            --filter="name~e2b-staging-orch-server AND status=RUNNING" \
            --format="value(name,zone)" \
            --sort-by="~creationTimestamp")

          while IFS=$'\t' read -r VM ZONE; do
            echo "server_vm=$VM" >> $GITHUB_OUTPUT
            echo "server_zone=$ZONE" >> $GITHUB_OUTPUT
            break
          done <<< "$CANDIDATES"

      - name: Open IAP tunnel to Nomad
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          echo "127.0.0.1 nomad.sandbox.e2b.staging.internal" | sudo tee -a /etc/hosts

          sudo -E gcloud compute start-iap-tunnel \
            ${{ steps.discover.outputs.server_vm }} 4646 \
            --local-host-port=localhost:80 \
            --zone=${{ steps.discover.outputs.server_zone }} \
            --project="${GCP_PROJECT_ID}" &
          TUNNEL_PID=$!
          echo "TUNNEL_PID=$TUNNEL_PID" >> $GITHUB_ENV

          for i in $(seq 1 30); do
            if curl -s --connect-timeout 2 http://nomad.sandbox.e2b.staging.internal/v1/status/leader > /dev/null 2>&1; then
              echo "IAP tunnel established"
              break
            fi
            sleep 2
          done

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-nomad
          path: iac/provider-gcp

      - name: Terraform apply (nomad)
        working-directory: iac/provider-gcp
        env:
          TF_IN_AUTOMATION: 'true'
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            -compact-warnings \
            -parallelism=10 \
            tfplan-nomad

      - name: Close IAP tunnel
        if: always()
        run: kill $TUNNEL_PID 2>/dev/null || true
