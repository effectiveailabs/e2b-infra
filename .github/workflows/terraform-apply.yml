name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'iac/provider-gcp/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Terraform environment to plan/apply'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging

# ──────────────────────────────────────────────────────────────
# Job graph:
#
#   plan ──▶ apply  (no manual approval — dev-like flow)
# ──────────────────────────────────────────────────────────────

jobs:
  plan:
    name: Plan (staging)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    outputs:
      has_changes: ${{ steps.plan_output.outputs.has_changes }}
      plan_summary: ${{ steps.plan_output.outputs.plan_summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/deploy-setup
        with:
          environment: staging
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          gcp_region: ${{ vars.GCP_REGION }}
          terraform_state_bucket: ${{ vars.TERRAFORM_STATE_BUCKET }}
          workload_identity_provider: ${{ secrets.GH_WORKLOAD_IDENTITY_PROVIDER }}
          install_gcloud: 'true'

      - name: Terraform plan
        id: tf_plan
        working-directory: iac/provider-gcp
        env:
          TF_IN_AUTOMATION: 'true'
        run: |
          TARGETS=$(grep '^module' main.tf | awk '{print $2}' | tr -d '"' | grep -v nomad | awk '{print "-target=module." $0}' | xargs)

          terraform plan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -compact-warnings \
            -parallelism=20 \
            -var-file=environments/staging.tfvars \
            $TARGETS \
            -out=tfplan 2>&1 | tee plan.out
          plan_exit=${PIPESTATUS[0]}

          if [ $plan_exit -eq 0 ] || [ $plan_exit -eq 2 ]; then
            terraform show -no-color tfplan > plan.show
          fi
          echo "exit_code=$plan_exit" >> $GITHUB_OUTPUT
          if [ $plan_exit -ne 0 ] && [ $plan_exit -ne 2 ]; then
            echo "::error::Terraform plan exited with unexpected code $plan_exit"
            exit 1
          fi

      - name: Extract plan summary
        id: plan_output
        working-directory: iac/provider-gcp
        run: |
          if [ "${{ steps.tf_plan.outputs.exit_code }}" != "2" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT

          summary=$(grep -E '^Plan:|^No changes' plan.show | tail -1)
          echo "plan_summary=$summary" >> $GITHUB_OUTPUT

      - name: Upload plan artifact
        if: steps.plan_output.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-staging
          path: |
            iac/provider-gcp/tfplan
            iac/provider-gcp/plan.out
            iac/provider-gcp/plan.show

  apply:
    name: Apply (staging)
    needs: plan
    if: needs.plan.outputs.has_changes == 'true'
    runs-on: ubuntu-22.04
    concurrency:
      group: terraform-apply-e2b-staging
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/deploy-setup
        with:
          environment: staging
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          gcp_region: ${{ vars.GCP_REGION }}
          terraform_state_bucket: ${{ vars.TERRAFORM_STATE_BUCKET }}
          workload_identity_provider: ${{ secrets.GH_WORKLOAD_IDENTITY_PROVIDER }}
          install_gcloud: 'true'

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-staging
          path: iac/provider-gcp

      - name: Terraform apply
        working-directory: iac/provider-gcp
        env:
          TF_IN_AUTOMATION: 'true'
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            -compact-warnings \
            -parallelism=20 \
            tfplan
