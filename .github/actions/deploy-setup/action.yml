name: "Deploy Setup"
description: "Sets up GCP auth via WIF and Terraform for CI"
inputs:
  environment:
    description: "Target environment (e.g. staging)"
    required: true
  gcp_project_id:
    description: "GCP project ID"
    required: true
  gcp_region:
    description: "GCP region"
    required: true
  terraform_state_bucket:
    description: "GCS bucket for Terraform remote state"
    required: true
  workload_identity_provider:
    description: "GCP Workload Identity Federation provider"
    required: true
  install_gcloud:
    description: "Whether to install the gcloud CLI"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set environment variables
      run: |
        echo "GCP_PROJECT_ID=${{ inputs.gcp_project_id }}" >> $GITHUB_ENV
        echo "GCP_REGION=${{ inputs.gcp_region }}" >> $GITHUB_ENV
        echo "TERRAFORM_STATE_BUCKET=${{ inputs.terraform_state_bucket }}" >> $GITHUB_ENV
        echo "${{ inputs.environment }}" > .last_used_env
      shell: bash

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        project_id: ${{ inputs.gcp_project_id }}
        workload_identity_provider: ${{ inputs.workload_identity_provider }}

    - name: Set up Cloud SDK
      if: inputs.install_gcloud == 'true'
      uses: google-github-actions/setup-gcloud@v2

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.7

    - name: Cache Terraform providers
      uses: actions/cache@v5
      with:
        path: ~/.terraform.d/plugin-cache
        key: terraform-providers-${{ hashFiles('iac/provider-gcp/.terraform.lock.hcl') }}
        restore-keys: |
          terraform-providers-

    - name: Terraform init
      working-directory: iac/provider-gcp
      run: |
        mkdir -p ~/.terraform.d/plugin-cache
        export TF_PLUGIN_CACHE_DIR=~/.terraform.d/plugin-cache
        terraform init -input=false -reconfigure \
          -backend-config="bucket=${{ inputs.terraform_state_bucket }}" \
          -backend-config="prefix=terraform/${{ inputs.environment }}"
      shell: bash
